<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Restablecer Contraseña</title>
</head>
<body>
    <h1>Restablecer Contraseña</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar enlace de restablecimiento de contraseña</button>
    </form>
    <p>¿Ya tienes una cuenta? <a href="{% url 'users:login' %}">Iniciar sesión</a></p>
</body>
</html>
