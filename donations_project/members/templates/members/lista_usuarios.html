<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lista de Usuarios{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'members/css/styles.css' %}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url 'members:index' %}">🏠 Inicio</a></li>
            <li><a href="{% url 'members:lista_casos' %}">📋 Casos</a></li>
            <li><a href="{% url 'members:lista_usuarios' %}">👥 Usuarios</a></li>
            <li><a href="{% url 'members:lista_donaciones' %}">💰 Donaciones</a></li>
            <li><a href="{% url 'members:lista_categorias' %}">🏷️ Categorías</a></li>
            <li><a href="/admin/">⚙️ Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Lista de Usuarios</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usuario in usuarios %}
                        <tr>
                            <td>{{ usuario.nombres }} {{ usuario.apellido_paterno }}</td>
                            <td>{{ usuario.correo }}</td>
                            <td>
                                <a href="{% url 'members:perfil_usuario' usuario.id %}" class="btn">Ver Perfil</a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="3">No hay usuarios disponibles.</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
