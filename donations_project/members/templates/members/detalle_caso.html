<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ caso.titulo }}</title>
    <link rel="stylesheet" href="{% static 'members/css/styles.css' %}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url 'members:index' %}">🏠 Inicio</a></li>
            <li><a href="{% url 'members:lista_casos' %}">📋 Casos</a></li>
            <li><a href="{% url 'members:lista_usuarios' %}">👥 Usuarios</a></li>
            <li><a href="{% url 'members:lista_donaciones' %}">💰 Donaciones</a></li>
            <li><a href="{% url 'members:lista_categorias' %}">🏷️ Categorías</a></li>
            <li><a href="/admin/">⚙️ Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h1>{{ caso.titulo }}</h1>
            <p><strong>Descripción:</strong> {{ caso.descripcion }}</p>
            <p><strong>Fecha de creación:</strong> {{ caso.fecha_creacion }}</p>
            <p><strong>Estado:</strong> {{ caso.estado }}</p>
            <div class="mt-4">
                <a href="{% url 'members:lista_casos' %}" class="btn">Volver a la lista de casos</a>
            </div>
        </div>
    </div>
</body>
</html>
