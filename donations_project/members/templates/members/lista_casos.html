<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lista de Casos{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'members/css/styles.css' %}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url 'members:index' %}">🏠 Inicio</a></li>
            <li><a href="{% url 'members:lista_casos' %}">📋 Casos</a></li>
            <li><a href="{% url 'members:lista_usuarios' %}">👥 Usuarios</a></li>
            <li><a href="{% url 'members:lista_donaciones' %}">💰 Donaciones</a></li>
            <li><a href="{% url 'members:lista_categorias' %}">🏷️ Categorías</a></li>
            <li><a href="/admin/">⚙️ Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Lista de Casos</h1>
        <div class="stats">
            {% for caso in casos %}
                <div class="card">
                    <h2>{{ caso.titulo }}</h2>
                    <p>{{ caso.descripcion|truncatechars:150 }}</p>
                    <a href="{% url 'members:detalle_caso' caso.id %}" class="btn">Ver Detalles</a>
                </div>
            {% empty %}
                <p>No hay casos disponibles en este momento.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
