{% extends 'web/base_web.html' %}
{% load static %}

{% block title %}Inicio - Aqui Estoy!{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-sky-800">Bienvenido, <span id="userName"></span></h1>
        <p class="text-gray-600 mt-2">Explora los casos que necesitan tu ayuda</p>
    </div>

    <!-- Filtros -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
                <select id="filtroCategoria" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500">
                    <option value="">Todas las categorías</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Estado</label>
                <select id="filtroEstado" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500">
                    <option value="">Todos los estados</option>
                    <option value="activo">Activos</option>
                    <option value="completado">Completados</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="aplicarFiltros()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold py-2 rounded-lg">
                    Aplicar Filtros
                </button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600"></div>
        <p class="text-gray-600 mt-4">Cargando casos...</p>
    </div>

    <!-- Grid de Casos -->
    <div id="casosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        <!-- Los casos se cargarán aquí dinámicamente -->
    </div>

    <!-- Sin Resultados -->
    <div id="noResults" class="text-center py-12 hidden">
        <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p class="text-gray-600 mt-4 text-lg">No se encontraron casos</p>
    </div>
</div>

<script src="{% static 'js/api-client.js' %}"></script>
<script>
    let casos = [];
    let categorias = [];

    // Verificar autenticación
    if (!api.isAuthenticated()) {
        window.location.href = '/login/';
    }

    // Cargar nombre de usuario
    const user = api.getUser();
    if (user) {
        document.getElementById('userName').textContent = user.nombres || 'Usuario';
    }

    // Cargar datos iniciales
    async function cargarDatos() {
        try {
            // Cargar categorías
            categorias = await api.getCategorias();
            cargarCategorias();

            // Cargar casos
            casos = await api.getCasos();
            mostrarCasos(casos);
        } catch (error) {
            console.error('Error al cargar datos:', error);
            mostrarError('Error al cargar los casos');
        }
    }

    function cargarCategorias() {
        const select = document.getElementById('filtroCategoria');
        categorias.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.textContent = cat.nombre;
            select.appendChild(option);
        });
    }

    function mostrarCasos(casosData) {
        const grid = document.getElementById('casosGrid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('noResults');

        loading.classList.add('hidden');

        if (casosData.length === 0) {
            noResults.classList.remove('hidden');
            grid.classList.add('hidden');
            return;
        }

        noResults.classList.add('hidden');
        grid.classList.remove('hidden');
        grid.innerHTML = casosData.map(caso => crearTarjetaCaso(caso)).join('');
    }

    function crearTarjetaCaso(caso) {
        const porcentaje = Math.min((caso.monto_recolectado / caso.monto_necesario) * 100, 100);
        const imagen = caso.imagen_principal || '/static/images/placeholder-caso.jpg';

        return `
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition duration-300">
                <img src="${imagen}" alt="${caso.titulo}" class="w-full h-48 object-cover">
                <div class="p-6">
                    <div class="flex items-center mb-2">
                        ${caso.categorias ? caso.categorias.map(cat => `
                            <span class="text-xs bg-sky-100 text-sky-800 px-2 py-1 rounded-full mr-2">${cat}</span>
                        `).join('') : ''}
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${caso.titulo}</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">${caso.descripcion}</p>
                    
                    <!-- Beneficiario -->
                    <div class="flex items-center mb-4 text-sm text-gray-600">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path>
                        </svg>
                        <span>${caso.beneficiario || 'Anónimo'}</span>
                    </div>

                    <!-- Progreso -->
                    <div class="mb-4">
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-600">Recaudado</span>
                            <span class="font-semibold text-sky-600">${porcentaje.toFixed(0)}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-sky-600 h-2 rounded-full" style="width: ${porcentaje}%"></div>
                        </div>
                        <div class="flex justify-between text-sm mt-1">
                            <span class="text-gray-600">$${Number(caso.monto_recolectado).toLocaleString()}</span>
                            <span class="text-gray-600">Meta: $${Number(caso.monto_necesario).toLocaleString()}</span>
                        </div>
                    </div>

                    <a href="/casos/${caso.id}/" 
                       class="block w-full text-center bg-sky-600 hover:bg-sky-700 text-white font-semibold py-2 rounded-lg transition">
                        Ver Detalles
                    </a>
                </div>
            </div>
        `;
    }

    async function aplicarFiltros() {
        const categoriaId = document.getElementById('filtroCategoria').value;
        const estado = document.getElementById('filtroEstado').value;

        const filtros = {};
        if (categoriaId) filtros.categoria = categoriaId;
        if (estado) filtros.estado = estado;

        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('casosGrid').classList.add('hidden');

        try {
            const casosFiltrados = await api.getCasos(filtros);
            mostrarCasos(casosFiltrados);
        } catch (error) {
            console.error('Error al filtrar casos:', error);
        }
    }

    function mostrarError(mensaje) {
        const grid = document.getElementById('casosGrid');
        grid.innerHTML = `
            <div class="col-span-full text-center py-12">
                <p class="text-red-600">${mensaje}</p>
            </div>
        `;
        grid.classList.remove('hidden');
        document.getElementById('loading').classList.add('hidden');
    }

    // Cargar datos al iniciar
    cargarDatos();
</script>
{% endblock %}
