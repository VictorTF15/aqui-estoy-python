{% extends 'web/base_web.html' %}
{% load static %}

{% block title %}Detalle del Caso - Aqui Estoy!{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Loading -->
    <div id="loading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600"></div>
    </div>

    <!-- Contenido del caso -->
    <div id="casoDetalle" class="hidden">
        <!-- El contenido se cargará dinámicamente -->
    </div>
</div>

<script src="{% static 'js/api-client.js' %}"></script>
<script>
    const casoId = window.location.pathname.split('/').filter(Boolean).pop();

    async function cargarCaso() {
        try {
            const caso = await api.getCaso(casoId);
            mostrarDetalleCaso(caso);
        } catch (error) {
            console.error('Error al cargar caso:', error);
            document.getElementById('loading').innerHTML = `
                <p class="text-red-600">Error al cargar el caso</p>
            `;
        }
    }

    function mostrarDetalleCaso(caso) {
        const porcentaje = Math.min((caso.monto_recolectado / caso.monto_necesario) * 100, 100);
        const container = document.getElementById('casoDetalle');

        container.innerHTML = `
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <!-- Imagen -->
                <img src="${caso.imagen_principal || '/static/images/placeholder.jpg'}" 
                     alt="${caso.titulo}" 
                     class="w-full h-96 object-cover">

                <div class="p-8">
                    <!-- Header -->
                    <div class="mb-6">
                        <h1 class="text-4xl font-bold text-gray-800 mb-4">${caso.titulo}</h1>
                        <div class="flex items-center text-gray-600">
                            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path>
                            </svg>
                            <span>Beneficiario: ${caso.beneficiario || 'Anónimo'}</span>
                        </div>
                    </div>

                    <!-- Progreso -->
                    <div class="bg-sky-50 rounded-lg p-6 mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <p class="text-3xl font-bold text-sky-600">$${Number(caso.monto_recolectado).toLocaleString()}</p>
                                <p class="text-gray-600">de $${Number(caso.monto_necesario).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold text-sky-600">${porcentaje.toFixed(0)}%</p>
                                <p class="text-gray-600">Completado</p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-4">
                            <div class="bg-sky-600 h-4 rounded-full transition-all" style="width: ${porcentaje}%"></div>
                        </div>
                        <button onclick="mostrarModalDonacion()" 
                                class="mt-4 w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-lg">
                            💝 Donar Ahora
                        </button>
                    </div>

                    <!-- Descripción -->
                    <div class="prose max-w-none mb-6">
                        <h2 class="text-2xl font-bold text-gray-800 mb-4">Descripción</h2>
                        <p class="text-gray-700 leading-relaxed">${caso.descripcion}</p>
                    </div>

                    <!-- Categorías -->
                    ${caso.categorias && caso.categorias.length > 0 ? `
                    <div class="mb-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2">Categorías</h3>
                        <div class="flex flex-wrap gap-2">
                            ${caso.categorias.map(cat => `
                                <span class="bg-sky-100 text-sky-800 px-3 py-1 rounded-full text-sm">${cat}</span>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Compartir -->
                    <div class="border-t pt-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">Compartir este caso</h3>
                        <div class="flex gap-3">
                            <button onclick="compartir('whatsapp')" 
                                    class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
                                WhatsApp
                            </button>
                            <button onclick="compartir('email')" 
                                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                                Email
                            </button>
                            <button onclick="copiarEnlace()" 
                                    class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">
                                Copiar Enlace
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('loading').classList.add('hidden');
        container.classList.remove('hidden');
    }

    function mostrarModalDonacion() {
        // Redirigir a página de donación
        window.location.href = `/donaciones/crear/${casoId}/`;
    }

    async function compartir(medio) {
        try {
            await api.compartirCaso(casoId, medio, '');
            alert(`Caso compartido por ${medio}`);
        } catch (error) {
            console.error('Error al compartir:', error);
        }
    }

    function copiarEnlace() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert('Enlace copiado al portapapeles');
        });
    }

    // Cargar caso al iniciar
    cargarCaso();
</script>
{% endblock %}
