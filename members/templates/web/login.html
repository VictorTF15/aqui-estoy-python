<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Aquí Estoy!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            opacity: 0.9;
            margin-bottom: 0;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating > .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            height: 60px;
            transition: all 0.3s ease;
        }

        .form-floating > .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-floating > label {
            color: #666;
            padding: 18px 15px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #764ba2;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .form-check {
            margin: 15px 0;
        }

        .form-check-label {
            color: #666;
            font-size: 14px;
        }

        .spinner-border-sm {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-heart-fill" style="font-size: 48px;"></i>
                <h1>Aquí Estoy!</h1>
                <p>Bienvenido de vuelta</p>
            </div>

            <div class="login-body">
                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="form-floating">
                        <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
                        <label for="correo"><i class="bi bi-envelope me-2"></i>Correo electrónico</label>
                    </div>

                    <div class="form-floating" style="position: relative;">
                        <input type="password" class="form-control" id="contrasena" placeholder="Contraseña" required>
                        <label for="contrasena"><i class="bi bi-lock me-2"></i>Contraseña</label>
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="recordar">
                            <label class="form-check-label" for="recordar">
                                Recordarme
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none" style="font-size: 14px; color: #667eea;">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-login" id="btnLogin">
                        <span id="btnText">Iniciar Sesión</span>
                        <span id="btnSpinner" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Iniciando...
                        </span>
                    </button>
                </form>

                <div class="divider">
                    <span>o</span>
                </div>

                <div class="register-link">
                    ¿No tienes una cuenta? 
                    <a href="/register/">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';

        // Mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('contrasena');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Función para mostrar alertas
        function mostrarAlerta(mensaje, tipo = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${tipo === 'success' ? 'check-circle' : 'exclamation-triangle'}-fill me-2"></i>
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Manejar envío del formulario
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const correo = document.getElementById('correo').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            const recordar = document.getElementById('recordar').checked;

            if (!correo || !contrasena) {
                mostrarAlerta('Por favor completa todos los campos');
                return;
            }

            // Mostrar spinner
            document.getElementById('btnText').classList.add('d-none');
            document.getElementById('btnSpinner').classList.remove('d-none');
            document.getElementById('btnLogin').disabled = true;

            try {
                console.log('Enviando credenciales:', { correo });
                
                const response = await fetch(`${API_BASE_URL}/auth/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        correo, 
                        password: document.getElementById('contrasena').value  // Cambiar aquí
                    })
                });

                const data = await response.json();

                if (response.ok && data.access) {
                    // Guardar tokens y datos del usuario
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }

                    // Si marcó "recordarme", guardar correo
                    if (recordar) {
                        localStorage.setItem('correo_guardado', correo);
                    } else {
                        localStorage.removeItem('correo_guardado');
                    }

                    mostrarAlerta('¡Inicio de sesión exitoso! Redirigiendo...', 'success');

                    // Esperar 1 segundo antes de redirigir
                    setTimeout(() => {
                        // Redirigir según tipo de usuario
                        if (data.user && data.user.tipo_usuario === 'Administrador') {
                            window.location.href = '/adm/'; 
                        } else {
                            window.location.href = '/perfil/';
                        }
                    }, 1000);

                } else {
                    // Manejar errores
                    let mensaje = 'Credenciales incorrectas';
                    
                    if (data.detail) {
                        mensaje = data.detail;
                    } else if (data.error) {
                        mensaje = data.error;
                    } else if (data.non_field_errors) {
                        mensaje = data.non_field_errors[0];
                    }

                    mostrarAlerta(mensaje);

                    // Restaurar botón
                    document.getElementById('btnText').classList.remove('d-none');
                    document.getElementById('btnSpinner').classList.add('d-none');
                    document.getElementById('btnLogin').disabled = false;
                }

            } catch (error) {
                console.error('Error:', error);
                mostrarAlerta('Error de conexión. Por favor intenta de nuevo.');

                // Restaurar botón
                document.getElementById('btnText').classList.remove('d-none');
                document.getElementById('btnSpinner').classList.add('d-none');
                document.getElementById('btnLogin').disabled = false;
            }
        });

        // Cargar correo guardado al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            const correoGuardado = localStorage.getItem('correo_guardado');
            if (correoGuardado) {
                document.getElementById('correo').value = correoGuardado;
                document.getElementById('recordar').checked = true;
            }

            // Si ya está logueado, redirigir
            const token = localStorage.getItem('access_token');
            if (token) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (user.tipo_usuario === 'Administrador') {
                    window.location.href = '/adm/';
                } else {
                    window.location.href = '/perfil/';
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
