<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Aquí Estoy!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .register-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .register-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .register-body {
            padding: 40px 30px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating > .form-control,
        .form-floating > .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            height: 60px;
            transition: all 0.3s ease;
        }

        .form-floating > .form-control:focus,
        .form-floating > .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-floating > label {
            color: #666;
            padding: 18px 15px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: -15px;
            margin-bottom: 15px;
            padding-left: 15px;
        }

        .password-requirements li {
            margin-bottom: 3px;
        }

        .password-requirements .valid {
            color: #28a745;
        }

        .password-requirements .invalid {
            color: #dc3545;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .step::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }

        .step:first-child::before {
            left: 50%;
            width: 50%;
        }

        .step:last-child::before {
            width: 50%;
            left: 0;
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            position: relative;
            z-index: 1;
            margin-bottom: 5px;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
        }

        .step.completed .step-number {
            background: #28a745;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #999;
        }

        .step.active .step-label {
            color: #667eea;
            font-weight: 600;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <i class="bi bi-person-plus-fill" style="font-size: 48px;"></i>
                <h1>Crear Cuenta</h1>
                <p>Únete a nuestra comunidad solidaria</p>
            </div>

            <div class="register-body">
                <div id="alertContainer"></div>

                <!-- Indicador de pasos -->
                <div class="step-indicator">
                    <div class="step active" data-step="1">
                        <div class="step-number">1</div>
                        <div class="step-label">Datos Personales</div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-number">2</div>
                        <div class="step-label">Contacto</div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-number">3</div>
                        <div class="step-label">Seguridad</div>
                    </div>
                </div>

                <form id="registerForm">
                    <!-- Paso 1: Datos Personales -->
                    <div class="form-section active" data-section="1">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="nombres" placeholder="Nombres" required>
                            <label for="nombres"><i class="bi bi-person me-2"></i>Nombres</label>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="apellido_paterno" placeholder="Apellido Paterno" required>
                                    <label for="apellido_paterno">Apellido Paterno</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="apellido_materno" placeholder="Apellido Materno">
                                    <label for="apellido_materno">Apellido Materno</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating">
                            <select class="form-select" id="id_tipo_usuario" required>
                                <option value="">Seleccionar...</option>
                            </select>
                            <label for="id_tipo_usuario"><i class="bi bi-tag me-2"></i>Tipo de Usuario</label>
                        </div>

                        <button type="button" class="btn btn-register" onclick="siguientePaso(2)">
                            Siguiente <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>

                    <!-- Paso 2: Contacto -->
                    <div class="form-section" data-section="2">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
                            <label for="correo"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                        </div>

                        <div class="form-floating">
                            <input type="tel" class="form-control" id="telefono" placeholder="Teléfono" required>
                            <label for="telefono"><i class="bi bi-telephone me-2"></i>Teléfono</label>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="ciudad" placeholder="Ciudad" required>
                                    <label for="ciudad"><i class="bi bi-geo-alt me-2"></i>Ciudad</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="estado" placeholder="Estado" required>
                                    <label for="estado">Estado</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary flex-fill" onclick="anteriorPaso(1)">
                                <i class="bi bi-arrow-left me-2"></i> Anterior
                            </button>
                            <button type="button" class="btn btn-register flex-fill" onclick="siguientePaso(3)">
                                Siguiente <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Paso 3: Seguridad -->
                    <div class="form-section" data-section="3">
                        <div class="form-floating" style="position: relative;">
                            <input type="password" class="form-control" id="contrasena" placeholder="Contraseña" required>
                            <label for="contrasena"><i class="bi bi-lock me-2"></i>Contraseña</label>
                            <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                        </div>

                        <ul class="password-requirements" id="passwordRequirements">
                            <li id="req-length">Mínimo 8 caracteres</li>
                            <li id="req-upper">Al menos una mayúscula</li>
                            <li id="req-lower">Al menos una minúscula</li>
                            <li id="req-number">Al menos un número</li>
                        </ul>

                        <div class="form-floating" style="position: relative;">
                            <input type="password" class="form-control" id="confirmar_contrasena" placeholder="Confirmar Contraseña" required>
                            <label for="confirmar_contrasena"><i class="bi bi-lock-fill me-2"></i>Confirmar Contraseña</label>
                            <i class="bi bi-eye password-toggle" id="toggleConfirmPassword"></i>
                        </div>

                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="terminos" required>
                            <label class="form-check-label" for="terminos">
                                Acepto los <a href="#" class="text-decoration-none">términos y condiciones</a>
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary flex-fill" onclick="anteriorPaso(2)">
                                <i class="bi bi-arrow-left me-2"></i> Anterior
                            </button>
                            <button type="submit" class="btn btn-register flex-fill" id="btnRegister">
                                <span id="btnText">Crear Cuenta</span>
                                <span id="btnSpinner" class="d-none">
                                    <span class="spinner-border spinner-border-sm me-2"></span>
                                    Registrando...
                                </span>
                            </button>
                        </div>
                    </div>
                </form>

                <div class="login-link">
                    ¿Ya tienes cuenta? 
                    <a href="/login/">Inicia sesión aquí</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';

        // Cargar tipos de usuario
        async function cargarTiposUsuario() {
            try {
                const response = await fetch(`${API_BASE_URL}/tipos-usuario/`);
                const data = await response.json();
                const tipos = data.results || data;

                const select = document.getElementById('id_tipo_usuario');
                tipos.forEach(tipo => {
                    const option = document.createElement('option');
                    option.value = tipo.id;
                    option.textContent = tipo.nombre;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error al cargar tipos de usuario:', error);
            }
        }

        // Navegación entre pasos
        function siguientePaso(paso) {
            // Validar campos del paso actual
            const seccionActual = document.querySelector('.form-section.active');
            const inputs = seccionActual.querySelectorAll('input[required], select[required]');
            let valido = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    valido = false;
                    input.classList.add('is-invalid');
                } else {
                    input.classList.remove('is-invalid');
                }
            });

            if (!valido) {
                mostrarAlerta('Por favor completa todos los campos requeridos');
                return;
            }

            // Cambiar paso
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.form-section[data-section="${paso}"]`).classList.add('active');

            // Actualizar indicador
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelector(`.step[data-step="${paso}"]`).classList.add('active');

            // Marcar pasos anteriores como completados
            for (let i = 1; i < paso; i++) {
                document.querySelector(`.step[data-step="${i}"]`).classList.add('completed');
            }
        }

        function anteriorPaso(paso) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.form-section[data-section="${paso}"]`).classList.add('active');

            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelector(`.step[data-step="${paso}"]`).classList.add('active');
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('contrasena');
            input.type = input.type === 'password' ? 'text' : 'password';
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const input = document.getElementById('confirmar_contrasena');
            input.type = input.type === 'password' ? 'text' : 'password';
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Validación de contraseña en tiempo real
        document.getElementById('contrasena').addEventListener('input', function() {
            const password = this.value;

            const requirements = {
                'req-length': password.length >= 8,
                'req-upper': /[A-Z]/.test(password),
                'req-lower': /[a-z]/.test(password),
                'req-number': /[0-9]/.test(password)
            };

            for (const [id, valid] of Object.entries(requirements)) {
                const element = document.getElementById(id);
                element.className = valid ? 'valid' : 'invalid';
                element.innerHTML = valid ? `<i class="bi bi-check-circle-fill me-1"></i>${element.textContent.replace(/✓|✗/g, '').trim()}` : `<i class="bi bi-x-circle-fill me-1"></i>${element.textContent.replace(/✓|✗/g, '').trim()}`;
            }
        });

        // Mostrar alertas
        function mostrarAlerta(mensaje, tipo = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${tipo === 'success' ? 'check-circle' : 'exclamation-triangle'}-fill me-2"></i>
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        // Enviar formulario
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const contrasena = document.getElementById('contrasena').value;
            const confirmar = document.getElementById('confirmar_contrasena').value;
            
            if (contrasena !== confirmar) {
                mostrarAlerta('Las contraseñas no coinciden');
                return;
            }

            if (contrasena.length < 8) {
                mostrarAlerta('La contraseña debe tener al menos 8 caracteres');
                return;
            }

            if (!document.getElementById('terminos').checked) {
                mostrarAlerta('Debes aceptar los términos y condiciones');
                return;
            }

            // Mostrar spinner
            document.getElementById('btnText').classList.add('d-none');
            document.getElementById('btnSpinner').classList.remove('d-none');
            document.getElementById('btnRegister').disabled = true;

            const data = {
                nombres: document.getElementById('nombres').value.trim(),
                apellido_paterno: document.getElementById('apellido_paterno').value.trim(),
                apellido_materno: document.getElementById('apellido_materno').value.trim(),
                correo: document.getElementById('correo').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                ciudad: document.getElementById('ciudad').value.trim(),
                estado: document.getElementById('estado').value.trim(),
                id_tipo_usuario: parseInt(document.getElementById('id_tipo_usuario').value),
                contrasena: contrasena
            };

            try {
                const response = await fetch(`${API_BASE_URL}/usuarios/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    mostrarAlerta('¡Cuenta creada exitosamente! Redirigiendo al login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 2000);
                } else {
                    let mensaje = 'Error al crear la cuenta';
                    
                    if (result.correo) {
                        mensaje = 'El correo ya está registrado';
                    } else if (result.error) {
                        mensaje = result.error;
                    } else if (result.detail) {
                        mensaje = result.detail;
                    }

                    mostrarAlerta(mensaje);
                    document.getElementById('btnText').classList.remove('d-none');
                    document.getElementById('btnSpinner').classList.add('d-none');
                    document.getElementById('btnRegister').disabled = false;
                }

            } catch (error) {
                console.error('Error:', error);
                mostrarAlerta('Error de conexión. Por favor intenta de nuevo.');
                document.getElementById('btnText').classList.remove('d-none');
                document.getElementById('btnSpinner').classList.add('d-none');
                document.getElementById('btnRegister').disabled = false;
            }
        });

        // Cargar tipos de usuario al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            cargarTiposUsuario();

            // Si ya está logueado, redirigir
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = '/home/';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
