{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro - Aqui Estoy!</title>
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body class="bg-blue-50 min-h-screen py-8">
  <div class="w-full max-w-2xl mx-auto px-4">
    <div class="bg-white shadow-lg rounded-lg overflow-hidden ring-1 ring-sky-100">
      <div class="p-6">
        <div class="text-center mb-6">
          <h1 class="text-3xl font-bold text-sky-800 mb-2">Aqui Estoy!</h1>
          <h2 class="text-xl font-semibold text-sky-600">Crear cuenta</h2>
          <p class="text-sm text-sky-500 mt-2">Únete a nuestra comunidad solidaria</p>
        </div>

        <!-- Alertas -->
        <div id="alertContainer"></div>

        <form id="registerForm" class="space-y-4" novalidate>
          {% csrf_token %}
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="nombres" class="block text-sm font-medium text-sky-700">Nombre(s) *</label>
              <input id="nombres" name="nombres" type="text" required
                     class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
            </div>

            <div>
              <label for="apellido_paterno" class="block text-sm font-medium text-sky-700">Apellido Paterno *</label>
              <input id="apellido_paterno" name="apellido_paterno" type="text" required
                     class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
            </div>
          </div>

          <div>
            <label for="apellido_materno" class="block text-sm font-medium text-sky-700">Apellido Materno</label>
            <input id="apellido_materno" name="apellido_materno" type="text"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          <div>
            <label for="correo" class="block text-sm font-medium text-sky-700">Correo Electrónico *</label>
            <input id="correo" name="correo" type="email" required
                   placeholder="correo@ejemplo.com"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          <div>
            <label for="telefono" class="block text-sm font-medium text-sky-700">Teléfono *</label>
            <input id="telefono" name="telefono" type="tel" required
                   placeholder="5512345678"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="ciudad" class="block text-sm font-medium text-sky-700">Ciudad *</label>
              <input id="ciudad" name="ciudad" type="text" required
                     class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
            </div>

            <div>
              <label for="estado" class="block text-sm font-medium text-sky-700">Estado *</label>
              <input id="estado" name="estado" type="text" required
                     class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
            </div>
          </div>

          <div>
            <label for="id_tipo_usuario" class="block text-sm font-medium text-sky-700">Tipo de Usuario *</label>
            <select id="id_tipo_usuario" name="id_tipo_usuario" required
                    class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400">
              <option value="">Selecciona...</option>
            </select>
          </div>

          <div>
            <label for="contrasena" class="block text-sm font-medium text-sky-700">Contraseña *</label>
            <input id="contrasena" name="contrasena" type="password" required
                   placeholder="••••••••"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
            <p class="text-xs text-sky-500 mt-1">Mínimo 8 caracteres</p>
          </div>

          <div>
            <label for="confirmar_contrasena" class="block text-sm font-medium text-sky-700">Confirmar Contraseña *</label>
            <input id="confirmar_contrasena" name="confirmar_contrasena" type="password" required
                   placeholder="••••••••"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          <div class="flex items-start">
            <input id="terminos" name="terminos" type="checkbox" required
                   class="mt-1 h-4 w-4 text-sky-600 border-blue-200 rounded focus:ring-sky-400" />
            <label for="terminos" class="ml-2 text-sm text-sky-700">
              Acepto los <a href="#" class="text-sky-700 hover:underline font-semibold">términos y condiciones</a>
            </label>
          </div>

          <button type="submit" id="registerBtn"
                  class="w-full py-2 px-4 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-md shadow transition-all">
            <span id="registerText">Crear Cuenta</span>
            <span id="registerSpinner" class="hidden">
              <svg class="animate-spin h-5 w-5 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creando cuenta...
            </span>
          </button>

          <p class="text-center text-sm text-sky-600">
            ¿Ya tienes cuenta? <a href="{% url 'members:login_web' %}" class="text-sky-700 hover:underline font-semibold">Inicia sesión</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script src="{% static 'js/api/apiClient.js' %}"></script>
  <script src="{% static 'js/api/authService.js' %}"></script>
  <script src="{% static 'js/web/register.js' %}"></script>
</body>
</html>
