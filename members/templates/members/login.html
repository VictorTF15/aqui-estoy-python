<!doctype html>
{% load static %}
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar sesión</title>
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md mx-4">
    <div class="bg-white shadow-lg rounded-lg overflow-hidden ring-1 ring-sky-100">
      <div class="p-6">
        <h2 class="text-2xl font-semibold text-center text-sky-800 mb-4">Iniciar sesión</h2>
        <form method="post" class="space-y-4" novalidate>
          {% csrf_token %}
          <div>
            <label for="correo" class="block text-sm font-medium text-sky-700">Correo</label>
            <input id="correo" name="correo" type="email" required
                   placeholder="correo@ejemplo.com"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          <div>
            <label for="contrasena" class="block text-sm font-medium text-sky-700">Contraseña</label>
            <input id="contrasena" name="contrasena" type="password" required
                   placeholder="••••••••"
                   class="mt-1 block w-full rounded-md border border-blue-100 bg-blue-50 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>

          

          <button type="submit" class="w-full py-2 px-4 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-md shadow">
            Entrar
          </button>

          <p class="text-center text-sm text-sky-600">
            ¿No tienes cuenta? <a href="{% url 'members:register' %}" class="text-sky-700 hover:underline">Regístrate</a>
          </p>
        </form>
      </div>
      <div class="bg-blue-50 px-6 py-3 text-center text-sm text-sky-500">
       
      </div>
    </div>
  </div>
</body>
</html>
