<!doctype html>
{% load static %}
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}Mi sitio{% endblock %}</title>
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body class="bg-blue-50 text-sky-900 min-h-screen">
    <header class="bg-white border-b border-blue-100">
        <nav class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="text-xl font-semibold text-sky-800">
                <a href="{% url 'members:index' %}" class="hover:text-sky-600">Aquí Estoy</a>
            </div>
            <div class="space-x-4 text-sm">
                <a href="{% url 'members:lista_usuarios' %}" class="text-sky-700 hover:text-sky-900">Usuarios</a>
                <a href="{% url 'members:lista_casos' %}" class="text-sky-700 hover:text-sky-900">Casos</a>
                <a href="{% url 'members:lista_donaciones' %}" class="text-sky-700 hover:text-sky-900">Donaciones</a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-8 border-t border-blue-100 bg-white">
        <div class="container mx-auto px-4 py-4 text-sm text-sky-600 text-center">
            © {% now "Y" %} Aquí Estoy
        </div>
    </footer>
</body>
</html>
